  <polygon points="455,506 450,510 455,514" />
  <text x="460" y="502" class="messageText">7. Alertă salvată ca activă</text>

  <line x1="450" y1="570" x2="155" y2="570" class="messageLine1" />
  <polygon points="155,566 150,570 155,574" />
  <text x="160" y="562" class="messageText">8. HTTP 201 Created (Răspuns JSON)</text>

