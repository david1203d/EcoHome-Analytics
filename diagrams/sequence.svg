  <line x1="150" y1="120" x2="445" y2="120" class="messageLine0" />
  <polygon points="445,116 450,120 445,124" />
  <text x="160" y="112" class="messageText">1. POST /api/readings (JSON payload)</text>

  <rect x="300" y="150" width="300" height="45" rx="3" ry="3" class="note" />
  <text x="310" y="168" class="noteText">[M4 FIX] Validare Input strictă</text>
  <text x="310" y="184" class="noteText">(Tipuri corecte, valori non-negative)</text>

  <line x1="450" y1="230" x2="745" y2="230" class="messageLine0" />
  <polygon points="745,226 750,230 745,234" />
  <text x="460" y="222" class="messageText">2. Selectare dispozitiv (Device.query.get)</text>

  <line x1="750" y1="270" x2="455" y2="270" class="messageLine1" />
  <polygon points="455,266 450,270 455,274" />
  <text x="460" y="262" class="messageText">3. Returnează putere nominală</text>

