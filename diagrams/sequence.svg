    polygon { fill: #ffffff; stroke: #ffffff; }
    .sequence-number { fill: #111827; font-weight: bold; }
  </style>

  <line x1="150" y1="80" x2="150" y2="820" class="messageLine1" />
  <line x1="450" y1="80" x2="450" y2="820" class="messageLine1" />
  <line x1="750" y1="80" x2="750" y2="820" class="messageLine1" />
  <line x1="1050" y1="80" x2="1050" y2="820" class="messageLine1" />

  <rect x="50" y="30" width="200" height="40" rx="5" ry="5" class="actor" />
