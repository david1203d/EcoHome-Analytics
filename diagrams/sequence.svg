  <polygon points="455,706 450,710 455,714" />
  <text x="460" y="706" class="messageText">11. Rezultate din baza de date</text>

  <line x1="450" y1="760" x2="1050" y2="760" class="messageLine1" />
  <polygon points="1045,756 1050,760 1045,764" />
  <text x="460" y="752" class="messageText">12. HTTP 200 OK (JSON cu monedă/tarife uniforme 1.29 din Config)</text>

