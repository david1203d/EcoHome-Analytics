  <text x="330" y="430" class="messageText" fill="#ef4444" style="font-weight:bold;">[ALT] Consumul depășește limita de siguranță (M2)</text>
  
  <line x1="450" y1="470" x2="745" y2="470" class="messageLine0" stroke="#ef4444" />
  <polygon points="745,466 750,470 745,474" style="fill:#ef4444; stroke:#ef4444;" />
  <text x="460" y="462" class="messageText">6. INSERT INTO alerts (Mesaj dinamic 1.5x)</text>

