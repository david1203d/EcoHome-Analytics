<svg id="graph-5" viewBox="0 0 1200 900" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="overflow: hidden; touch-action: none; user-select: none; -webkit-user-drag: none; -webkit-tap-highlight-color: rgba(0, 0, 0, 0); background-color: rgb(2, 8, 23);" role="graphics-document document" aria-roledescription="sequence" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .actor { stroke: #ccccff; fill: #1f2937; font-family: 'Segoe UI', sans-serif; }
