  <polygon points="745,316 750,320 745,324" />
  <text x="460" y="312" class="messageText">4. INSERT INTO energy_readings [M3 ON CONFLICT DO NOTHING]</text>

  <line x1="750" y1="360" x2="455" y2="360" class="messageLine1" />
  <polygon points="455,356 450,360 455,364" />
  <text x="460" y="352" class="messageText">5. Confirmare inserare / Idempotență asigurată</text>

