    .messageLine0 { stroke: #ffffff; stroke-width: 1.5; stroke-dasharray: none; }
    .messageLine1 { stroke: #aaaaaa; stroke-width: 1.5; stroke-dasharray: 3,3; }
    .messageText { fill: #ffffff; stroke: none; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
    .note { fill: #111827; stroke: #4b5563; }
